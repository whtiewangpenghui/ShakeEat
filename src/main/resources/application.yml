spring:
  application:
    name: ShakeEat
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/shakeeat?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  ai:
    ollama:
      enabled: true
      base-url: http://127.0.0.1:11434
      model: deepseek-v3.1:671b-cloud
      text-models:
        - deepseek-v3.1:671b-cloud
        - glm-4.6:cloud
        - minimax-m2:cloud
        - gpt-oss:20b-cloud
        - gpt-oss:120b-cloud
      temperature: 0.7
    deepseek:
      enabled: false
      api-key:
      base-url: https://api.deepseek.com
      model: deepseek-chat
      temperature: 0.75
      max-tokens: 200
